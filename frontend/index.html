<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Obras</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Gerenciador de Obras</h1>

    <!-- Botão para alternar tema claro/escuro -->
    <button id="toggleThemeBtn">🌙 Tema</button>

    <!-- Formulário para cadastro de nova obra -->
    <h2>Cadastrar Nova Obra</h2>
    <form id="formObra">
      <label>Nome da Obra:</label>
      <input type="text" id="nome" required />
      <label>Localização:</label>
      <input type="text" id="localizacao" required />
      <label>Responsável:</label>
      <input type="text" id="responsavel" />
      <label>Status:</label>
      <select id="status">
        <option>Inicial</option>
        <option>Em andamento</option>
        <option>Concluída</option>
      </select>
      <label>Progresso (%):</label>
      <input type="number" id="progresso" min="0" max="100" value="0" required />
      <label>Orçamento (R$):</label>
      <input type="number" id="orcamento" min="0" value="0" />
      <button type="submit">Cadastrar</button>
    </form>

    <!-- Lista de obras cadastradas -->
    <h2>Obras Cadastradas</h2>
    <button onclick="exportarExcel()">📊 Exportar Excel</button>
    <button onclick="exportarPDF()">📄 Exportar PDF</button>
    <div id="listaObras"></div>

    <!-- Modal para edição de obra, etapa ou material -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="fecharModal()">&times;</span>
        <h3 id="modalTitle"></h3>
        <form id="modalForm">
          <div id="modalFields"></div>
          <button type="submit">Salvar</button>
        </form>
      </div>
    </div>

    <!-- Toast para mensagens rápidas -->
    <div id="toast" class="toast"></div>

    <!-- Bibliotecas externas para Excel e PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script>
      /* ================== VARIÁVEIS GLOBAIS ================== */
      let obras = []; // Array que armazena todas as obras cadastradas
      const CACHE_KEY = "obrasCacheFinal"; // Chave do LocalStorage
      const THEME_KEY = "theme"; // Chave do LocalStorage para tema
      let db; // Referência do IndexedDB

      // Referências de elementos principais
      const body = document.body;
      const toggleThemeBtn = document.getElementById("toggleThemeBtn");
      const listaObrasDiv = document.getElementById("listaObras");

      /* ================== CONFIGURAÇÃO DE TEMA ================== */
      const savedTheme = localStorage.getItem(THEME_KEY) || "light"; // Pega o tema salvo ou usa light
      body.classList.add(savedTheme);
      toggleThemeBtn.textContent = savedTheme === "dark" ? "☀️ Tema" : "🌙 Tema";

      // Alterna tema entre claro e escuro
      toggleThemeBtn.addEventListener("click", () => {
        body.classList.toggle("dark");
        body.classList.toggle("light");
        const theme = body.classList.contains("dark") ? "dark" : "light";
        localStorage.setItem(THEME_KEY, theme);
        toggleThemeBtn.textContent = theme === "dark" ? "☀️ Tema" : "🌙 Tema";
        mostrarToast("Tema alterado para " + theme);
      });

      /* ================== FUNÇÃO DE BOTÃO REUTILIZÁVEL ================== */
      // Cria botão com texto, classe e ação ao clicar
      function criarBotao(texto, classe, aoClicar) {
        const btn = document.createElement("button");
        btn.textContent = texto;
        btn.className = classe;
        btn.addEventListener("click", aoClicar);
        return btn;
      }

      /* ================== TOAST ================== */
      // Exibe mensagem temporária na tela
      function mostrarToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      /* ================== MODAL ================== */
      const modal = document.getElementById("modal");
      const modalTitle = document.getElementById("modalTitle");
      const modalFields = document.getElementById("modalFields");
      const modalForm = document.getElementById("modalForm");

      // Abre modal com título, campos HTML e função ao enviar
      function abrirModal(titulo, campos, onSubmit) {
        modalTitle.textContent = titulo;
        modalFields.innerHTML = campos;
        modal.style.display = "flex";
        modal.classList.add("show");
        modalForm.onsubmit = (e) => {
          e.preventDefault();
          const data = Object.fromEntries(new FormData(modalForm));
          onSubmit(data); // chama função de envio passando os dados
          fecharModal();
        };
      }

      // Fecha modal
      function fecharModal() {
        modal.classList.remove("show");
        setTimeout(() => (modal.style.display = "none"), 300);
      }

      /* ================== LOCALSTORAGE ================== */
      function salvarObrasLocal() {
        localStorage.setItem(CACHE_KEY, JSON.stringify(obras));
      }

      function carregarObrasLocal() {
        try {
          const raw = localStorage.getItem(CACHE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      }

      /* ================== INDEXEDDB ================== */
      // Abre IndexedDB e cria store se necessário
      function abrirDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open("GerenciadorObrasDB", 1);
          request.onerror = (event) => reject(event);
          request.onsuccess = (event) => {
            db = event.target.result;
            resolve(db);
          };
          request.onupgradeneeded = (event) => {
            db = event.target.result;
            if (!db.objectStoreNames.contains("obras"))
              db.createObjectStore("obras", { keyPath: "id" });
          };
        });
      }

      // Salva todas as obras no IndexedDB
      async function salvarTudoDB() {
        if (!db) await abrirDB();
        const tx = db.transaction("obras", "readwrite");
        const store = tx.objectStore("obras");
        await store.clear(); // Limpa antes de salvar
        obras.forEach((o) => store.put(o));
        return tx.complete;
      }

      // Carrega todas as obras do IndexedDB
      async function carregarTudoDB() {
        if (!db) await abrirDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction("obras", "readonly");
          const store = tx.objectStore("obras");
          const request = store.getAll();
          request.onsuccess = (e) => resolve(e.target.result);
          request.onerror = (e) => reject(e);
        });
      }

      /* ================== UTILITÁRIOS ================== */
      // Gera ID único para obras, etapas e materiais
      function gerarId() {
        return Date.now() + Math.floor(Math.random() * 1000);
      }

      // Calcula progresso geral da obra com base nas etapas
      function calcularProgressoGeral(obra) {
        if (!obra.etapas || !obra.etapas.length)
          return Number(obra.progresso || 0);
        let total = 0;
        obra.etapas.forEach((e) => {
          const s = (e.status || "").toLowerCase();
          if (s === "concluída") total += 100;
          else if (s === "em andamento") total += 50;
        });
        return Math.round(total / obra.etapas.length);
      }

      // Calcula orçamento automático baseado nos materiais
      function calcularOrcamentoAutomatico(obra) {
        if (!obra.etapas || !obra.etapas.length) return obra.orcamento || 0;
        let total = 0;
        obra.etapas.forEach((etapa) =>
          (etapa.materiais || []).forEach(
            (m) => (total += (m.quantidade || 0) * (m.custoUnit || 0))
          )
        );
        return total;
      }

      /* ================== RENDERIZAÇÃO ================== */
      // Exibe materiais de uma etapa
      function exibirMateriais(obra, etapa) {
        const div = document.getElementById(`materiais-${obra.id}-${etapa.id}`);
        if (!div) return;
        div.innerHTML = "";
        (etapa.materiais || []).forEach((mat) => {
          const mDiv = document.createElement("div");
          mDiv.className = "material";
          mDiv.textContent = `${mat.nome || "-"} - Qtd: ${mat.quantidade || 0} - Custo: ${(mat.custoUnit || 0).toLocaleString("pt-BR", {
            style: "currency",
            currency: "BRL",
          })}`;
          mDiv.appendChild(
            criarBotao("Excluir", "btn-excluir", () =>
              excluirMaterial(obra.id, etapa.id, mat.id)
            )
          );
          div.appendChild(mDiv);
        });
      }

      // Exibe etapas da obra
      function exibirEtapas(obra) {
        const div = document.getElementById(`etapas-${obra.id}`);
        if (!div) return;
        div.innerHTML = "";
        (obra.etapas || []).forEach((etapa) => {
          const eDiv = document.createElement("div");
          eDiv.className = "etapa";
          eDiv.innerHTML = `<strong>${etapa.nome || "-"} </strong> (Status: ${etapa.status || "-"})`;
          eDiv.appendChild(
            criarBotao("Editar", "btn-editar", () => editarEtapa(obra.id, etapa.id))
          );
          eDiv.appendChild(
            criarBotao("Excluir", "btn-excluir", () => excluirEtapa(obra.id, etapa.id))
          );
          eDiv.appendChild(
            criarBotao("Adicionar Material", "btn-add", () =>
              abrirModalAdicionarMaterial(obra.id, etapa.id)
            )
          );
          eDiv.appendChild(document.createElement("br"));
          const divMateriais = document.createElement("div");
          divMateriais.id = `materiais-${obra.id}-${etapa.id}`;
          eDiv.appendChild(divMateriais);
          div.appendChild(eDiv);
          exibirMateriais(obra, etapa);
        });
      }

      // Atualiza toda a tela (lista de obras)
      function atualizarTela() {
        listaObrasDiv.innerHTML = "";
        if (!obras.length) {
          listaObrasDiv.innerHTML = "<p>Nenhuma obra cadastrada.</p>";
          return;
        }

        obras.forEach((obra) => {
          const div = document.createElement("div");
          div.className = "obra";
          const progressoSafe = calcularProgressoGeral(obra);
          const orcamentoSafe = calcularOrcamentoAutomatico(obra);
          const valorData = progressoSafe <= 30 ? "low" : progressoSafe <= 70 ? "medium" : "high";

          div.innerHTML = `
            <h3>${obra.nome || "-"}</h3>
            <p><strong>Localização:</strong> ${obra.localizacao || "-"}</p>
            <p><strong>Responsável:</strong> ${obra.responsavel || "-"}</p>
            <p><strong>Status:</strong> ${obra.status || "-"}</p>
            <p><strong>Orçamento:</strong> ${orcamentoSafe.toLocaleString("pt-BR", {style: "currency",currency: "BRL"})}</p>
            <div class="barra"><div class="progresso" style="width:${progressoSafe}%" data-value="${valorData}">${progressoSafe}%</div></div>
            <h4>Etapas</h4><div id="etapas-${obra.id}"></div>
          `;

          div.appendChild(criarBotao("Editar", "btn-editar", () => editarObra(obra.id)));
          div.appendChild(criarBotao("Excluir", "btn-excluir", () => excluirObra(obra.id)));
          div.appendChild(criarBotao("Adicionar Etapa", "btn-add", () => abrirModalAdicionarEtapa(obra.id)));

          listaObrasDiv.appendChild(div);
          exibirEtapas(obra);
        });

        salvarObrasLocal();
        salvarTudoDB();
      }

      /* ================== CRUD OBRAS ================== */
      // Cadastro de nova obra
      document.getElementById("formObra").addEventListener("submit", (e) => {
        e.preventDefault();
        const novaObra = {
          id: gerarId(),
          nome: document.getElementById("nome").value,
          localizacao: document.getElementById("localizacao").value,
          responsavel: document.getElementById("responsavel").value,
          status: document.getElementById("status").value,
          progresso: parseInt(document.getElementById("progresso").value),
          orcamento: parseFloat(document.getElementById("orcamento").value) || 0,
          etapas: [],
        };
        obras.push(novaObra);
        atualizarTela();
        e.target.reset();
        mostrarToast("Obra cadastrada com sucesso!");
      });

      // Excluir obra
      function excluirObra(id) {
        if (!confirm("Excluir esta obra?")) return;
        obras = obras.filter((o) => o.id !== id);
        atualizarTela();
        mostrarToast("Obra excluída!");
      }

      // Editar obra
      function editarObra(id) {
        const obra = obras.find((o) => o.id === id);
        if (!obra) return;
        abrirModal(
          "Editar Obra",
          `
          <label>Nome:</label><input type="text" name="nome" value="${obra.nome}" required>
          <label>Localização:</label><input type="text" name="localizacao" value="${obra.localizacao}" required>
          <label>Responsável:</label><input type="text" name="responsavel" value="${obra.responsavel || ""}">
          <label>Status:</label>
          <select name="status">
            <option ${obra.status === "Inicial" ? "selected" : ""}>Inicial</option>
            <option ${obra.status === "Em andamento" ? "selected" : ""}>Em andamento</option>
            <option ${obra.status === "Concluída" ? "selected" : ""}>Concluída</option>
          </select>
          <label>Progresso (%):</label><input type="number" name="progresso" min="0" max="100" value="${obra.progresso}">
          <label>Orçamento (R$):</label><input type="number" name="orcamento" min="0" value="${obra.orcamento}">
        `,
          (data) => {
            obra.nome = data.nome;
            obra.localizacao = data.localizacao;
            obra.responsavel = data.responsavel;
            obra.status = data.status;
            obra.progresso = parseInt(data.progresso);
            obra.orcamento = parseFloat(data.orcamento);
            atualizarTela();
            mostrarToast("Obra editada!");
          }
        );
      }

      /* ================== CRUD ETAPAS E MATERIAIS ================== */
      // Adicionar etapa
      function abrirModalAdicionarEtapa(obraId) {
        const obra = obras.find((o) => o.id === obraId);
        abrirModal(
          "Adicionar Etapa",
          `
          <label>Nome da Etapa:</label><input type="text" name="nome" required>
          <label>Status:</label>
          <select name="status">
            <option value="Inicial">Inicial</option>
            <option value="Em andamento">Em andamento</option>
            <option value="Concluída">Concluída</option>
          </select>
        `,
          (data) => {
            obra.etapas.push({
              id: gerarId(),
              nome: data.nome,
              status: data.status,
              materiais: [],
            });
            atualizarTela();
            mostrarToast("Etapa adicionada!");
          }
        );
      }

      // Adicionar material
      function abrirModalAdicionarMaterial(obraId, etapaId) {
        const obra = obras.find((o) => o.id === obraId);
        const etapa = obra.etapas.find((e) => e.id === etapaId);
        abrirModal(
          "Adicionar Material",
          `
          <label>Nome do Material:</label><input type="text" name="nome" required>
          <label>Quantidade:</label><input type="number" name="quantidade" required>
          <label>Custo Unitário:</label><input type="number" name="custo" required>
        `,
          (data) => {
            etapa.materiais.push({
              id: gerarId(),
              nome: data.nome,
              quantidade: parseFloat(data.quantidade),
              custoUnit: parseFloat(data.custo),
            });
            atualizarTela();
            mostrarToast("Material adicionado!");
          }
        );
      }

      // Excluir etapa
      function excluirEtapa(obraId, etapaId) {
        if (!confirm("Excluir etapa e materiais?")) return;
        const obra = obras.find((o) => o.id === obraId);
        obra.etapas = obra.etapas.filter((e) => e.id !== etapaId);
        atualizarTela();
        mostrarToast("Etapa excluída!");
      }

      // Editar etapa
      function editarEtapa(obraId, etapaId) {
        const obra = obras.find((o) => o.id === obraId);
        const etapa = obra.etapas.find((e) => e.id === etapaId);
        abrirModal(
          "Editar Etapa",
          `
          <label>Nome:</label><input type="text" name="nome" value="${etapa.nome}" required>
          <label>Status:</label>
          <select name="status">
            <option value="Inicial" ${etapa.status === "Inicial" ? "selected" : ""}>Inicial</option>
            <option value="Em andamento" ${etapa.status === "Em andamento" ? "selected" : ""}>Em andamento</option>
            <option value="Concluída" ${etapa.status === "Concluída" ? "selected" : ""}>Concluída</option>
          </select>
        `,
          (data) => {
            etapa.nome = data.nome;
            etapa.status = data.status;
            atualizarTela();
            mostrarToast("Etapa editada!");
          }
        );
      }

      // Excluir material
      function excluirMaterial(obraId, etapaId, materialId) {
        if (!confirm("Excluir material?")) return;
        const obra = obras.find((o) => o.id === obraId);
        const etapa = obra.etapas.find((e) => e.id === etapaId);
        etapa.materiais = etapa.materiais.filter((m) => m.id !== materialId);
        atualizarTela();
        mostrarToast("Material excluído!");
      }

      /* ================== EXPORTAÇÃO ================== */
      // Exportar para Excel
      function exportarExcel() {
        if (!obras.length) {
          alert("Nenhuma obra para exportar!");
          return;
        }
        const dados = [];
        obras.forEach((obra) => {
          dados.push({
            Obra: obra.nome,
            Localizacao: obra.localizacao,
            Responsavel: obra.responsavel,
            Status: obra.status,
            Progresso: obra.progresso,
            Orcamento: obra.orcamento,
          });
          (obra.etapas || []).forEach((etapa) => {
            dados.push({ Obra: "→ " + etapa.nome, Localizacao: etapa.status });
            (etapa.materiais || []).forEach((mat) => {
              dados.push({
                Obra: "   - " + mat.nome,
                Localizacao: "Qtd: " + mat.quantidade,
                Responsavel:
                  "Custo: " +
                  mat.custoUnit.toLocaleString("pt-BR", {
                    style: "currency",
                    currency: "BRL",
                  }),
              });
            });
          });
        });
        const ws = XLSX.utils.json_to_sheet(dados);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Obras");
        XLSX.writeFile(wb, "obras.xlsx");
        mostrarToast("Excel exportado!");
      }

      // Exportar para PDF
      function exportarPDF() {
        if (!obras.length) {
          alert("Nenhuma obra para exportar!");
          return;
        }
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const dados = [];
        obras.forEach((obra) => {
          dados.push([
            obra.nome,
            obra.localizacao,
            obra.responsavel,
            obra.status,
            obra.progresso + "%",
            obra.orcamento.toLocaleString("pt-BR", { style: "currency", currency: "BRL" }),
          ]);
          (obra.etapas || []).forEach((etapa) => {
            dados.push(["→ " + etapa.nome, etapa.status, "", "", "", ""]);
            (etapa.materiais || []).forEach((mat) => {
              dados.push([
                "   - " + mat.nome,
                "Qtd: " + mat.quantidade,
                "Custo: " + mat.custoUnit.toLocaleString("pt-BR", { style: "currency", currency: "BRL" }),
                "",
                "",
                "",
              ]);
            });
          });
        });
        doc.autoTable({
          head: [["Obra/Etapa/Material", "Status", "Responsável", "Campo4", "Progresso", "Orçamento"]],
          body: dados,
          startY: 20,
          theme: "grid",
        });
        doc.save("obras.pdf");
        mostrarToast("PDF exportado!");
      }

      /* ================== INICIALIZAÇÃO ================== */
      (async () => {
        // Carregar dados do LocalStorage
        const cacheInicial = carregarObrasLocal();
        if (cacheInicial.length) {
          obras = cacheInicial;
          atualizarTela();
        }

        // Carregar dados do IndexedDB
        const dbObras = await carregarTudoDB();
        if (dbObras.length) {
          obras = dbObras;
          atualizarTela();
          salvarObrasLocal();
        }
      })();
    </script>
  </body>
</html>
